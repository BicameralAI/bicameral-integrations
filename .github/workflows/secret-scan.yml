name: Secret scan

on:
  pull_request:
    branches: ["main"]

# gitleaks-action@v2 requires a paid license for organizations
# (https://github.com/gitleaks/gitleaks-action#-announcement).
# We use trufflehog instead — free for all repos, equally capable
# detector ruleset — matching the bicameral-mcp standard.
permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # full history so trufflehog can scan the diff range
      - uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
