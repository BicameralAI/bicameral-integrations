name: Governance Boundary

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  governance-boundary:
    name: governance-boundary
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Validate governance boundary
        run: python3 scripts/validate_governance_boundary.py
