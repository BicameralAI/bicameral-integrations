name: _reusable-governance-gate

# Reusable governance-integrity gate. Verifies the CALLER repo's committed
# META_LEDGER hash chain + FEATURE_INDEX test paths, using the verifier script
# fetched from the tooling repo. Consumers SHA-pin both `uses:` ref and tooling-ref.
on:
  workflow_call:
    inputs:
      tooling-repo:
        description: Repo holding scripts/governance_gate.py
        type: string
        default: BicameralAI/bicameral-integrations
      tooling-ref:
        description: SHA (pin this) of the tooling repo to fetch the verifier from
        type: string
        required: true

permissions:
  contents: read

jobs:
  governance-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history: bundle provenance tests verify reviewed_commit ancestry.
          fetch-depth: 0
      - name: Fetch governance tooling (pinned)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.tooling-repo }}
          ref: ${{ inputs.tooling-ref }}
          path: .governance-tooling
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Verify caller's governance artifacts
        run: python .governance-tooling/scripts/governance_gate.py --repo-root "$GITHUB_WORKSPACE"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Verifier self-tests
        run: python -m pytest .governance-tooling/scripts/tests -q
