name: Prepare Runtime Redaction Test

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/prepare-runtime-redaction-test.yml
      - runtime/tests/test_runtime.py

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: rfq/github-source-acquisition-alpha
          fetch-depth: 0
      - name: Replace one legacy rejection assertion
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("runtime/tests/test_runtime.py")
          text = path.read_text(encoding="utf-8")
          old = '''def test_deliver_poll_servicenow_beta():
              # End-to-end redact-and-pass: a secret in the description would be REJECTED raw,
              # but the connector redacts it so the emission passes the FX-SEC-001 hard screen.
              record = _fixture_payload("servicenow", "incident.json")
              raw = Observation(
                  source_ref=SourceRef(source_id="servicenow", ref="x"),
                  excerpt=record["description"],
              )
              with pytest.raises(
                  EmissionContractError
              ):  # companion non-vacuity: raw really trips FX-SEC-001
                  normalize([raw], adapter_version="runtime/0.1.0")
          '''
          new = '''def test_deliver_poll_servicenow_beta():
              # Required pre-Bot redaction preserves the incident while removing quoted secrets.
              record = _fixture_payload("servicenow", "incident.json")
              raw = Observation(
                  source_ref=SourceRef(source_id="servicenow", ref="x"),
                  excerpt=record["description"],
              )
              sanitized = normalize([raw], adapter_version="runtime/0.1.0")[0]
              assert "AKIAIOSFODNN7EXAMPLE" not in sanitized.body
              assert "[redacted:secret]" in sanitized.body
              assert sanitized.metadata["redaction_receipt"]["findings"] == [
                  {"category": "secret", "action": "tokenized", "count": 1}
              ]
          '''
          old = old.replace("          ", "")
          new = new.replace("          ", "")
          if new in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit("expected legacy assertion block not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git diff --check
      - name: Commit exact patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/tests/test_runtime.py
          git commit -m "test(redaction): assert ServiceNow sanitization receipt"
          git push origin HEAD:rfq/github-source-acquisition-alpha
