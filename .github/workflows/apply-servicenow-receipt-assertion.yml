name: Apply ServiceNow Receipt Assertion

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-servicenow-receipt-assertion.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: rfq/github-source-acquisition-alpha
          fetch-depth: 0
      - name: Assert both PII and secret findings
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path("runtime/tests/test_runtime.py")
          text = path.read_text(encoding="utf-8")
          function = re.search(
              r"def test_deliver_poll_servicenow_beta\(\):\n(?P<body>.*?)(?=\n\ndef )",
              text,
              re.DOTALL,
          )
          if function is None:
              raise SystemExit("ServiceNow test function not found")
          body = function.group(0)
          if '"category": "pii"' in body and '"category": "secret"' in body:
              raise SystemExit(0)
          pattern = re.compile(
              r'    assert sanitized\.metadata\["redaction_receipt"\]\["findings"\] == \[\n'
              r'        \{"category": "secret", "action": "tokenized", "count": 1\}\n'
              r'    \]'
          )
          replacement = '''    assert sanitized.metadata["redaction_receipt"]["findings"] == [
              {"category": "pii", "action": "tokenized", "count": 1},
              {"category": "secret", "action": "tokenized", "count": 1},
          ]'''.replace("              ", "        ").replace("          ]", "    ]")
          updated_body, count = pattern.subn(replacement, body, count=1)
          if count != 1:
              raise SystemExit("expected ServiceNow receipt assertion not found")
          path.write_text(text.replace(body, updated_body, 1), encoding="utf-8")
          PY
          git diff --check
      - name: Commit exact assertion
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/tests/test_runtime.py
          git commit -m "test(redaction): record ServiceNow PII and secret findings"
          git push origin HEAD:rfq/github-source-acquisition-alpha
