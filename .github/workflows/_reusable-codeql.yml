name: _reusable-codeql

on:
  workflow_call:
    inputs:
      languages:
        description: Comma/space-separated CodeQL languages (e.g. "python", "python,javascript")
        type: string
        default: python
      upload:
        description: Upload SARIF to Code Scanning; use "never" when Code Security is unavailable.
        type: string
        default: always

permissions:
  contents: read

jobs:
  analyze:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ inputs.languages }}
          queries: security-extended
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          upload: ${{ inputs.upload }}
