name: _reusable-codeql

on:
  workflow_call:
    inputs:
      languages:
        description: Comma/space-separated CodeQL languages (e.g. "python", "python,javascript")
        type: string
        default: python
      upload:
        description: Upload SARIF to Code Scanning; use "never" when Code Security is unavailable.
        type: string
        default: always

permissions:
  contents: read

jobs:
  analyze:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ inputs.languages }}
          queries: security-extended
      - uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          upload: ${{ inputs.upload }}
