name: Apply Runtime Import Cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-runtime-import-cleanup.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: rfq/github-source-acquisition-alpha
          fetch-depth: 0
      - name: Remove migrated unused import
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("runtime/tests/test_runtime.py")
          text = path.read_text(encoding="utf-8")
          old = "from adapter.core.pipeline import EmissionContractError, normalize\n"
          new = "from adapter.core.pipeline import normalize\n"
          if new in text and old not in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit("expected pipeline import not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git diff --check
      - name: Commit exact cleanup
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/tests/test_runtime.py
          git commit -m "style(test): remove migrated unused runtime import"
          git push origin HEAD:rfq/github-source-acquisition-alpha
