name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  schedule:
    - cron: "30 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    # Write scopes scoped to the calling job (top-level stays read-only) so the
    # Scorecard Token-Permissions check passes; the reusable's effective token is
    # the intersection of this job's grant and its own job permissions.
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: ./.github/workflows/_reusable-codeql.yml
    with:
      languages: python
