name: Red Team

# Connector-specific adversarial regression gates (blocking). Encodes the confirmed
# purple-team go-live attack classes (2026-06-11, issues #94-#102) as permanent barriers:
# SSRF/redirect, fail-closed parse, FX-SEC-001 per-leaf PAN + URL/ref PII, host injection,
# type-confusion, gateway-body reflection, runtime-key widening, redaction invariant.
# Complements the generic SAST/CodeQL/secret-scan gates, which assert none of these.

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  redteam:
    name: red-team regression gates (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install tools
        run: python -m pip install --upgrade pip ruff pytest
      - name: Ruff (red-team suite)
        run: ruff check tests/redteam
      - name: Red Team regression gates
        run: python -m pytest tests/redteam -q  # python -m puts repo root on sys.path (adapter/ etc. importable)
