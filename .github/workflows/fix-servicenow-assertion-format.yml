name: Fix ServiceNow Assertion Format

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-servicenow-assertion-format.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: rfq/github-source-acquisition-alpha
          fetch-depth: 0
      - name: Fix exact assertion indentation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("runtime/tests/test_runtime.py")
          text = path.read_text(encoding="utf-8")
          old = '''    assert sanitized.metadata["redaction_receipt"]["findings"] == [
              {"category": "pii", "action": "tokenized", "count": 1},
              {"category": "secret", "action": "tokenized", "count": 1},
          ]
          '''.replace("              ", "    ").replace("          ]", "]").replace("          '''", "'''")
          new = '''    assert sanitized.metadata["redaction_receipt"]["findings"] == [
              {"category": "pii", "action": "tokenized", "count": 1},
              {"category": "secret", "action": "tokenized", "count": 1},
          ]
          '''.replace("              ", "        ").replace("          ]", "    ]").replace("          '''", "'''")
          if new in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit("malformed ServiceNow assertion not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          python -m pip install --quiet ruff
          ruff format runtime/tests/test_runtime.py
          git diff --check
      - name: Commit exact formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/tests/test_runtime.py
          git commit -m "style(test): format ServiceNow receipt assertion"
          git push origin HEAD:rfq/github-source-acquisition-alpha
