name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history: the information-cycle bundle's provenance checks
          # verify reviewed_commit ancestry and blobs via git.
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install tools
        # Keep Ruff aligned with .pre-commit-config.yaml so lint results are
        # repository-defined rather than dependent on the latest release.
        run: python -m pip install --upgrade pip ruff==0.15.5 mypy pytest jsonschema==4.25.1
      - name: Ruff
        run: ruff check adapter connectors runtime mods
      - name: Mypy
        run: |
          set -o pipefail
          mypy --show-error-codes adapter connectors runtime mods 2>&1 | tee /tmp/mypy.log
      - name: Upload mypy diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mypy-diagnostics
          path: /tmp/mypy.log
          if-no-files-found: ignore
      - name: Pytest
        run: |
          set -o pipefail
          pytest adapter/core/tests connectors runtime mods scripts/tests tests/redteam tests/redaction_evaluation -q 2>&1 | tee /tmp/pytest.log
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pytest-diagnostics
          path: /tmp/pytest.log
          if-no-files-found: ignore
      - name: Connector config descriptors (validate + index freshness)
        run: python scripts/validate_connector_config.py
      - name: Mod descriptors (validate + manifest-consistency + index freshness)
        run: python scripts/validate_mod_config.py
      - name: Ingest schema pin + conformance gate
        run: python scripts/validate_ingest_schema_pin.py
      - name: Alpha ingest manifest (closed schema + honesty semantics)
        run: python scripts/validate_alpha_ingest_manifest.py
      - name: Information-cycle evidence bundle (record chain + lineage + provenance)
        # Runs on the synthetic merge ref for integration compatibility; the
        # exact-head receipt is deliberately NOT emitted here (see the
        # dedicated exact-head-receipt job, which checks out the real head).
        run: python scripts/validate_information_cycle_bundle.py ingest/evidence/local_directory-passive_import/bundle.json
      - name: Redaction evaluation corpus and annotation gate
        run: python scripts/validate_redaction_evaluation_contract.py
      - name: Redaction evaluation review and decision gate
        run: python scripts/validate_redaction_evaluation_governance.py

  exact-head-receipt:
    name: information-cycle exact-head receipt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Explicit EXACT-head checkout: the real PR head for pull requests,
          # the pushed commit otherwise — never GitHub's synthetic
          # refs/pull/<n>/merge commit.
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Emit exact-head validation receipt (fail-closed head assertion)
        run: |
          set -euo pipefail
          EXPECTED="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          # Regression guard: a synthetic merge commit can never masquerade as
          # exact-head evidence.
          test "$(git rev-parse HEAD)" = "${EXPECTED}"
          python scripts/validate_information_cycle_bundle.py             ingest/evidence/local_directory-passive_import/bundle.json             --emit-head-receipt /tmp/exact-head-validation-receipt.json             --expected-head "${EXPECTED}"
      - name: Upload exact-head validation receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: information-cycle-exact-head-receipt
          path: /tmp/exact-head-validation-receipt.json
          if-no-files-found: error

