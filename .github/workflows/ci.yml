name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install tools
        run: python -m pip install --upgrade pip ruff mypy pytest
      - name: Ruff
        run: ruff check adapter connectors runtime mods
      - name: Mypy
        run: |
          set -o pipefail
          mypy --show-error-codes adapter connectors runtime mods 2>&1 | tee /tmp/mypy.log
      - name: Upload mypy diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mypy-diagnostics
          path: /tmp/mypy.log
          if-no-files-found: ignore
      - name: Pytest
        run: |
          set -o pipefail
          pytest adapter/core/tests connectors runtime mods scripts/tests tests/redteam -q 2>&1 | tee /tmp/pytest.log
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pytest-diagnostics
          path: /tmp/pytest.log
          if-no-files-found: ignore
      - name: Connector config descriptors (validate + index freshness)
        run: python scripts/validate_connector_config.py
      - name: Mod descriptors (validate + manifest-consistency + index freshness)
        run: python scripts/validate_mod_config.py
      - name: Ingest schema pin + conformance gate
        run: python scripts/validate_ingest_schema_pin.py
      - name: Alpha ingest manifest (closed schema + honesty semantics)
        run: python scripts/validate_alpha_ingest_manifest.py
      - name: Information-cycle evidence bundle (record chain + lineage + provenance + exact-head receipt)
        run: python scripts/validate_information_cycle_bundle.py ingest/evidence/local_directory-passive_import/bundle.json --emit-head-receipt /tmp/exact-head-validation-receipt.json
      - name: Upload exact-head validation receipt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: information-cycle-exact-head-receipt
          path: /tmp/exact-head-validation-receipt.json
          if-no-files-found: ignore
