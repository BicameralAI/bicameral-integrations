name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tools
        run: python -m pip install --upgrade pip ruff mypy pytest
      - name: Ruff
        run: ruff check adapter connectors
      - name: Mypy
        run: mypy adapter/core connectors/github
      - name: Pytest
        run: pytest adapter/core/tests connectors/github/tests -q
