name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: lint + type + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install tools
        run: python -m pip install --upgrade pip ruff mypy pytest
      - name: Ruff
        run: ruff check adapter connectors runtime mods
      - name: Mypy
        run: mypy adapter connectors runtime mods
      - name: Pytest
        run: pytest adapter/core/tests connectors runtime mods scripts/tests tests/redteam -q
      - name: Connector config descriptors (validate + index freshness)
        run: python scripts/validate_connector_config.py
      - name: Mod descriptors (validate + manifest-consistency + index freshness)
        run: python scripts/validate_mod_config.py
      - name: Ingest schema pin + conformance gate
        run: python scripts/validate_ingest_schema_pin.py
