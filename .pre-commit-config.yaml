# Lint/format on commit; secret scanning is CI-enforced via TruffleHog
# (.github/workflows/secret-scan.yml), matching the bicameral-mcp standard.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
